services:
  mysql:
    image: mysql:8.0
    container_name: backend111_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: backend111
      MYSQL_USER: backend
      MYSQL_PASSWORD: backend123
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
